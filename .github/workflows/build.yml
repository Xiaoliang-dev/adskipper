name: Build APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Set build version
      run: |
        COMMIT_HASH=${{ github.sha }}
        SHORT_HASH=${COMMIT_HASH:0:7}

        VERSION_NAME="1.0.0-dev+${SHORT_HASH}"
        VERSION_CODE=${{ github.run_number }}

        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "version.name=$VERSION_NAME" >> local.properties
        echo "version.code=$VERSION_CODE" >> local.properties
        echo "commit.hash=$SHORT_HASH" >> local.properties

        echo "VERSION_NAME=$VERSION_NAME"
        echo "VERSION_CODE=$VERSION_CODE"
        echo "SHORT_HASH=$SHORT_HASH"

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AdSkipper-Debug-APK-${{ github.sha }}
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '11076708'
        packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Semantic Release
      uses: cycjimmy/semantic-release-action@v4
      id: semantic
      with:
        branch: main
        extra_plugins: |
          @semantic-release/git
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set release version and rebuild Release APK
      if: steps.semantic.outputs.new_release_published == 'true'
      run: |
        TAG_VERSION=${{ steps.semantic.outputs.new_release_version }}
        VERSION_NAME=$TAG_VERSION
        IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_VERSION"
        VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
        COMMIT_HASH=${{ github.sha }}
        SHORT_HASH=${COMMIT_HASH:0:7}

        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        echo "version.name=$VERSION_NAME" >> local.properties
        echo "version.code=$VERSION_CODE" >> local.properties
        echo "commit.hash=$SHORT_HASH" >> local.properties

        echo "RELEASE_VERSION_NAME=$VERSION_NAME"
        echo "RELEASE_VERSION_CODE=$VERSION_CODE"

    - name: Build Release APK
      if: steps.semantic.outputs.new_release_published == 'true'
      run: ./gradlew assembleRelease --no-daemon

    - name: Upload Release APK to GitHub Release
      if: steps.semantic.outputs.new_release_published == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.semantic.outputs.new_release_git_tag }}
        name: ${{ steps.semantic.outputs.new_release_git_tag }}
        body: ${{ steps.semantic.outputs.new_release_notes }}
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
